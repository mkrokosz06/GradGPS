services:
  dynamodb:
    image: amazon/dynamodb-local:latest
    container_name: degreecheck-dynamodb
    ports:
      - "127.0.0.1:8000:8000"       # bind to loopback only — not LAN-exposed
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]

  s3:
    image: minio/minio:latest
    container_name: degreecheck-s3
    ports:
      - "127.0.0.1:9000:9000"       # bind to loopback only — not LAN-exposed
      - "127.0.0.1:9001:9001"       # MinIO web console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-test}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-testtest}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  minio_data:
